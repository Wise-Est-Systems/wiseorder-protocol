name: lint

on:
  push:
  pull_request:

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff==0.7.4

      - name: ruff check (no auto-fix; report only)
        run: ruff check intellagent_runtime/ tools/ tests/
        continue-on-error: true

      - name: ruff format --check (whitespace + import order only)
        run: ruff format --check intellagent_runtime/
        continue-on-error: true
