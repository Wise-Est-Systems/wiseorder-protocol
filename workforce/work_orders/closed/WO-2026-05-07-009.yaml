# WORK ORDER — WO-2026-05-07-009 (OPEN)
# Author REAL-AGENT-RUNTIME-v0.2.md and extend tools/real_agent_runtime.py
# with bounded subprocess execute mode (builder, P3 hardening cycle).
#
# Governed by: WORKFORCE-EXECUTION-RUNTIME-v0.1.md, AGENT-GOVERNANCE-WORKFORCE-v0.1.md,
# WORKFORCE-HARDENING-v0.2.md, REAL-AGENT-RUNTIME-v0.1.md.
#
# Scope note: builder upgrade. Adds local subprocess execution under existing
# admission, command-policy, and filesystem-policy semantics; preserves v0.1
# dry-run behavior verbatim; does not introduce autonomy, models, daemons, or
# network access. v0.2 remains policy-layer containment (kernel isolation
# remains future enforcement R-2). Required gates include both v0.1 gates and
# the three runtime gates: real-agent-check, real-agent-dry-run, and the new
# real-agent-execute-check. The new gate is NOT added to make ci.

