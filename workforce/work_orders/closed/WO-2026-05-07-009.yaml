  - "SPEC.md"

constraints:
  - "v0.1 dry-run semantics preserved verbatim"
  - "no autonomous AI agents created"
  - "no model calls"
  - "no background daemons"
  - "no network access"
  - "no unscoped execution"
  - "no writes outside sandbox or reports/real_agent_runtime/"
  - "no weakening of any v0.1 refusal behavior"
  - "no modification of WiseOrder semantics"
  - "no modification of Intellagent semantics"
  - "no modification of SPEC.md"
  - "no modification of vectors or canonicalization corpus"
  - "real-agent-* targets not added to make ci"
  - "execute mode runs only allowlisted commands"
  - "execute mode runs commands only inside the sandbox copy"
  - "execute mode blocks forbidden commands BEFORE subprocess invocation"
  - "execute mode captures stdout, stderr, exit_code, duration_ms, cwd, and timeout-on-true for every attempt"
  - "execute mode times out every command with a bounded wall-clock cap"
  - "execute mode fails closed on any policy violation"
  - "execute mode produces a machine-checkable run manifest (the v0.1 16-field set, plus v0.2 execute-mode extensions)"
  - "subprocess invocations use Python stdlib subprocess.run only"
  - "subprocess cwd is the sandbox root"
  - "subprocess env is minimal: PATH, LC_ALL=C, LANG=C, optional PYTHONPATH only when required by the command"
  - "list args (no shell=True) unless impossible; current allowlist requires no shell=True"
  - "source repo fingerprint pre-execution must equal source repo fingerprint post-execution"
  - "sandbox changes are fingerprinted and recorded in the manifest"
  - "deliverable REAL-AGENT-RUNTIME-v0.2.md must contain the following sections, in order, each non-empty: 1. Purpose; 2. Difference Between v0.1 Dry-Run And v0.2 Execute Mode; 3. What Becomes Real In v0.2; 4. What Remains Not Real; 5. Work Order Admission; 6. Subprocess Execution Boundary; 7. Sandbox Boundary; 8. Command Policy; 9. Filesystem Policy; 10. Environment Policy; 11. Manifest Requirements; 12. Timeout Requirements; 13. Failure Modes; 14. Security Non-Guarantees; 15. Required Tests; 16. Future OS Isolation; 17. Final Law"
  - "deliverable must explicitly state: v0.2 creates real local subprocess execution; v0.2 does not create autonomous AI planning; v0.2 does not create background agents; v0.2 does not provide kernel-level isolation; v0.2 is still policy-layer containment, not OS-level containment; agents become real only as bounded worker processes executing approved work orders in sandbox copies"
  - "execute-mode v0.2 allowlist is exactly: pwd; ls; find; cat; .venv/bin/python tools/check_no_pseudocode.py; .venv/bin/python tools/check_workforce.py; .venv/bin/python tools/real_agent_runtime.py check; make no-pseudocode; make workforce-check; make real-agent-check"
  - "forbidden command patterns are exactly the v0.1 set: sudo; curl; wget; ssh; scp; git push; git reset --hard; git clean; rm -rf; chmod; chown; open<space>; http://; https://"
  - "execute-mode self-check fixture suite covers: execute allowed command succeeds; forbidden command blocked before subprocess; command timeout recorded; wrong agent identity refused; drafted work order refused; closed work order refused unless explicit replay mode used; missing allowed_files refused; missing forbidden_files refused; source repo unchanged after execute mode; manifest records stdout/stderr/exit/duration/cwd"
  - "closure criteria: execute mode exists; subprocess execution works for allowlisted commands; forbidden commands blocked before subprocess; source repo unchanged during execute tests; manifests include command results; timeout behavior tested; reports/real_agent_runtime/real_agent_runtime_v0.2.{md,json} exist; all required gates green; work order moved to closed/; replay continuity preserved"

expected_outputs:
  - "REAL-AGENT-RUNTIME-v0.2.md"
  - "tools/real_agent_runtime.py (extended; v0.1 dry-run preserved verbatim)"
  - "Makefile (added real-agent-execute-check target; not in make ci)"
