agent_role: "builder"
assigned_to: "builder-01"
objective: "Upgrade REAL-AGENT-RUNTIME-v0.1 from dry-run policy classification into REAL-AGENT-RUNTIME-v0.2 by extending tools/real_agent_runtime.py with a bounded local-subprocess execute mode under the existing admission, command-policy, filesystem-policy, and manifest layers. Author REAL-AGENT-RUNTIME-v0.2.md as the normative spec for the new mode. Preserve every v0.1 refusal behavior. Do not enable autonomy, models, background daemons, or network access. Do not weaken any existing rule. Add a make target real-agent-execute-check that exercises the new mode against built-in fixtures and is NOT included in make ci."

