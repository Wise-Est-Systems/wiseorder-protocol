risk_notes:
  - "v0.2 is policy-layer containment, not OS-level containment. The sandbox is shutil.copytree, not a UNIX user namespace, jail, or container. A subprocess with sufficient operator privilege could still escape the sandbox path. Future enforcement (R-2 in REAL-AGENT-RUNTIME-v0.1.md §16, retargeted to v0.3+ in REAL-AGENT-RUNTIME-v0.2.md §16) addresses OS-level isolation; this work order does not authorize that move."
  - "v0.2 introduces real subprocess invocation under bounded parameters (cwd inside sandbox, minimal env, wall-clock timeout, shell=False, list argv). It does not introduce autonomy, model calls, background daemons, or network access. The v0.2 execute allowlist is a strict script-call superset of the v0.1 dry-run allowlist; v0.2 explicitly drops bare-interpreter entries (python3, .venv/bin/python without script) and bare make ci because both could run arbitrary code paths."
  - "v0.2 adds a replay_mode flag that admits a closed work order ONLY when the only refusal would be status_not_admissible AND the WO's status is exactly 'closed'. Every other refusal still applies. The replay flag is recorded in the manifest. This is a forensic re-run capability, not a closure-undo capability; the work order's lifecycle remains terminated and the action log is not appended by replay execution."
  - "v0.2 manifests are unsigned JSON; cryptographic attestation (R-3 / AGENT-IDENTITY-v0.1.md) and hash-chained manifests (R-4) remain future enforcement. A post-hoc edit of a v0.2 manifest is detectable only by manual review. v0.2 closes none of these gaps."
  - "v0.2 does not bound memory, CPU, file-descriptor count, or process count; only wall-clock time is bounded (default 60s, hard cap 300s, floor 0.001s). Resource limits beyond wall-clock are R-5 future enforcement."
  - "make real-agent-execute-check is NOT added to make ci, in compliance with the work order's constraint and L-9 of REAL-AGENT-RUNTIME-v0.2.md. The Makefile's ci target is unchanged: ci: no-pseudocode test conformance interop canonicalization-check."
  - "The reviewer signoff identity for this work order is the human owner under the L-1 fallback (no second reviewer identity exists in v0.1 / v0.2). The audit's P1 entry REVIEWER-IDENTITY-v0.1.md addresses this gap; that document is not authorized by this work order."

